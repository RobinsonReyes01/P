{% extends "base.html" %}

{% block content %}

<h2>Productos</h2>

<a href="/productos/nuevo">Nuevo</a>

<table class="table">
<tr>
<th>ID</th>
<th>Nombre</th>
<th>Precio</th>
<th>Stock</th>
<th>Acciones</th>
</tr>

{% for p in productos %}
<tr>
<td>{{ p[0] }}</td>
<td>{{ p[1] }}</td>
<td>{{ p[2] }}</td>
<td>{{ p[3] }}</td>
<td>
<a href="/productos/editar/{{ p[0] }}">Editar</a>
<a href="/productos/eliminar/{{ p[0] }}">Eliminar</a>
</td>
</tr>
{% endfor %}

</table>

{% endblock %}
